<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบสำรวจความพึงพอใจ PKG</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2742 50%,#0d2137 100%);min-height:100vh;color:#e0e6ed}
    .container{max-width:640px;margin:0 auto;padding:20px 16px}
    .header{text-align:center;padding:24px 0 16px}
    .header h1{font-size:1.5em;color:#4fc3f7;margin-bottom:4px}
    .header p{font-size:0.9em;color:#90a4ae}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(79,195,247,0.2);border-radius:12px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
    .card h2{font-size:1.15em;color:#4fc3f7;margin-bottom:12px;border-bottom:1px solid rgba(79,195,247,0.2);padding-bottom:8px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:0.9em;color:#b0bec5;margin-bottom:4px}
    .form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1px solid rgba(79,195,247,0.3);border-radius:8px;background:rgba(0,0,0,0.3);color:#e0e6ed;font-size:1em;transition:border-color 0.2s;font-family:inherit}
    .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#4fc3f7;box-shadow:0 0 0 2px rgba(79,195,247,0.2)}
    .form-group input:read-only{background:rgba(0,0,0,0.5);color:#4fc3f7;font-weight:bold;cursor:default}
    .id-wrapper{position:relative}
    .autocomplete-list{position:absolute;width:100%;max-height:200px;overflow-y:auto;background:#1a2742;border:1px solid rgba(79,195,247,0.3);border-radius:0 0 8px 8px;z-index:100;display:none}
    .autocomplete-list.show{display:block}
    .autocomplete-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(79,195,247,0.1);font-size:0.9em}
    .autocomplete-item:hover,.autocomplete-item.active{background:rgba(79,195,247,0.15)}
    .autocomplete-item .id{color:#4fc3f7;font-weight:bold}
    .autocomplete-item .name{color:#e0e6ed}
    .autocomplete-item .detail{color:#78909c;font-size:0.85em}
    .member-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .member-info .form-group{margin-bottom:0}
    .scale-group{margin-bottom:12px}
    .scale-group label{display:block;font-size:0.9em;color:#b0bec5;margin-bottom:6px}
    .scale-options{display:flex;gap:8px}
    .scale-btn{flex:1;padding:10px 4px;text-align:center;border:2px solid rgba(79,195,247,0.3);border-radius:8px;background:rgba(0,0,0,0.2);color:#b0bec5;cursor:pointer;font-size:1em;font-weight:bold;transition:all 0.2s}
    .scale-btn:hover{border-color:rgba(79,195,247,0.6);background:rgba(79,195,247,0.1)}
    .scale-btn.selected{border-color:#4fc3f7;background:rgba(79,195,247,0.25);color:#4fc3f7;transform:scale(1.05)}
    .scale-labels{display:flex;justify-content:space-between;font-size:0.75em;color:#78909c;margin-top:2px}
    .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#4fc3f7,#0288d1);border:none;border-radius:8px;color:white;font-size:1.1em;font-weight:bold;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
    .btn-submit:hover{opacity:0.9}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed}
    .btn-back{width:100%;padding:10px;background:transparent;border:1px solid rgba(79,195,247,0.3);border-radius:8px;color:#4fc3f7;font-size:0.9em;cursor:pointer;margin-bottom:8px}
    .progress{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
    .progress-dot{width:10px;height:10px;border-radius:50%;background:rgba(79,195,247,0.2)}
    .progress-dot.active{background:#4fc3f7}
    .progress-dot.done{background:#66bb6a}
    .hidden{display:none}
    .error{color:#ef5350;font-size:0.85em;margin-top:4px}
    .loading{text-align:center;padding:40px}
    .loading .spinner{display:inline-block;width:40px;height:40px;border:3px solid rgba(79,195,247,0.3);border-top-color:#4fc3f7;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px;color:#4fc3f7">กำลังโหลดข้อมูลสมาชิก...</p>
  </div>
  <div id="formPage" class="hidden">
    <div class="header">
      <h1>📋 แบบสำรวจความพึงพอใจ</h1>
      <p>ทีมบัญชีและทีมการเงิน — PKG Group</p>
    </div>
    <div class="progress">
      <div class="progress-dot active" id="dot1"></div>
      <div class="progress-dot" id="dot2"></div>
      <div class="progress-dot" id="dot3"></div>
    </div>
    <div id="page1" class="card">
      <h2>📋 ข้อมูลสมาชิก</h2>
      <div class="form-group">
        <label>รหัสสมาชิก <span style="color:#ef5350">*</span></label>
        <div class="id-wrapper">
          <input type="text" id="memberId" placeholder="พิมพ์รหัสหรือชื่อ..." autocomplete="off" required>
          <div class="autocomplete-list" id="memberList"></div>
        </div>
        <div id="memberError" class="error"></div>
      </div>
      <div class="member-info">
        <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="memberName" readonly placeholder="—"></div>
        <div class="form-group"><label>บริษัท</label><input type="text" id="memberCompany" readonly placeholder="—"></div>
      </div>
      <div class="form-group"><label>ทีม</label><input type="text" id="memberTeam" readonly placeholder="—"></div>
      <button class="btn-submit" id="btnNext1" disabled onclick="goToPage(2)">ถัดไป →</button>
    </div>
    <div id="page2" class="card hidden">
      <h2>📊 ทีมบัญชี</h2>
      <div id="acctQuestions"></div>
      <div class="form-group" style="margin-top:12px">
        <label>ข้อเสนอแนะเกี่ยวกับทีมบัญชี (ไม่จำเป็น)</label>
        <textarea id="acctSuggestion" placeholder="มีข้อเสนอแนะอะไรเพิ่มเติมไหม?" style="width:100%;padding:10px 12px;border:1px solid rgba(79,195,247,0.3);border-radius:8px;background:rgba(0,0,0,0.3);color:#e0e6ed;font-size:0.9em;min-height:60px;resize:vertical"></textarea>
      </div>
      <button class="btn-back" onclick="goToPage(1)">← กลับ</button>
      <button class="btn-submit" onclick="goToPage(3)">ถัดไป →</button>
    </div>
    <div id="page3" class="card hidden">
      <h2>💰 ทีมการเงิน</h2>
      <div id="finQuestions"></div>
      <div class="form-group" style="margin-top:12px">
        <label>ข้อเสนอแนะเกี่ยวกับทีมการเงิน (ไม่จำเป็น)</label>
        <textarea id="finSuggestion" placeholder="มีข้อเสนอแนะอะไรเพิ่มเติมไหม?" style="width:100%;padding:10px 12px;border:1px solid rgba(79,195,247,0.3);border-radius:8px;background:rgba(0,0,0,0.3);color:#e0e6ed;font-size:0.9em;min-height:60px;resize:vertical"></textarea>
      </div>
      <button class="btn-back" onclick="goToPage(2)">← กลับ</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitForm()">✅ ส่งแบบสำรวจ</button>
    </div>
    <div id="successPage" class="card hidden" style="text-align:center;padding:40px 20px">
      <div style="font-size:3em;margin-bottom:16px">🎉</div>
      <h2 style="color:#66bb6a;margin-bottom:8px">ส่งแบบสำรวจเรียบร้อยแล้ว!</h2>
      <p style="color:#90a4ae">ขอบคุณที่ร่วมแสดงความคิดเห็น</p>
      <p id="submitInfo" style="color:#4fc3f7;margin-top:12px;font-size:0.9em"></p>
    </div>
  </div>
</div>
<!-- โหลดข้อมูลสมาชิกผ่าน Script Tag (ข้าม CORS) -->
<script src="https://script.google.com/macros/s/AKfycbwrnxQwSLA_p97H8nMLuOMe8a_bgCOrJOJT1rU25Jc8c4wX_EbVrvnYtSMmIc84U1yzGg/exec?action=memberData"></script>
<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbwrnxQwSLA_p97H8nMLuOMe8a_bgCOrJOJT1rU25Jc8c4wX_EbVrvnYtSMmIc84U1yzGg/exec';
var selectedMember = null;

// รอข้อมูลสมาชิกโหลดเสร็จ
function initForm() {
  if (typeof MEMBERS === 'undefined' || !MEMBERS || MEMBERS.length === 0) {
    document.getElementById('loading').innerHTML = '<p style="color:#ef5350">❌ โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้า</p>';
    return;
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('formPage').classList.remove('hidden');
  buildQuestions();
}

function buildQuestions() {
  var acctItems = ['ความร่วมมือ','ความรับผิดชอบ','ความเร็วในการตอบสนอง','ความถูกต้องของข้อมูล','การให้คำปรึกษา','ความพึงพอใจภาพรวม'];
  var finItems = ['ความร่วมมือ','ความรับผิดชอบ','ความเร็วในการตอบสนอง','ความถูกต้องของข้อมูล','การให้คำปรึกษา','ความพึงพอใจภาพรวม'];
  var acctHtml = '';
  for (var i = 0; i < acctItems.length; i++) { acctHtml += makeScale('acct', i+1, acctItems[i]); }
  document.getElementById('acctQuestions').innerHTML = acctHtml;
  var finHtml = '';
  for (var j = 0; j < finItems.length; j++) { finHtml += makeScale('fin', j+1, finItems[j]); }
  document.getElementById('finQuestions').innerHTML = finHtml;
}

function makeScale(prefix, num, title) {
  var labels = ['','ไม่พึงพอใจ','พึงพอใจน้อย','พึงพอใจ','พึงพอใจมาก'];
  var h = '<div class="scale-group"><label>'+num+'. '+title+' <span style="color:#ef5350">*</span></label><div class="scale-options">';
  for (var v = 1; v <= 4; v++) {
    h += '<div class="scale-btn" data-group="'+prefix+'_'+num+'" data-value="'+v+'" onclick="selectScale(this)" title="'+labels[v]+'">'+v+'</div>';
  }
  h += '</div><div class="scale-labels"><span>ไม่พึงพอใจ</span><span>พึงพอใจมาก</span></div></div>';
  return h;
}

function selectScale(el) {
  var group = el.getAttribute('data-group');
  var siblings = document.querySelectorAll('.scale-btn[data-group="'+group+'"]');
  for (var i = 0; i < siblings.length; i++) { siblings[i].classList.remove('selected'); }
  el.classList.add('selected');
}

// Autocomplete
var memberIdInput = document.getElementById('memberId');
var memberListEl = document.getElementById('memberList');
var selectedIdx = -1;

memberIdInput.addEventListener('input', function() {
  var query = this.value.trim().toLowerCase();
  selectedMember = null;
  document.getElementById('memberName').value = '';
  document.getElementById('memberTeam').value = '';
  document.getElementById('memberCompany').value = '';
  document.getElementById('btnNext1').disabled = true;
  document.getElementById('memberError').textContent = '';
  if (query.length < 1) { memberListEl.classList.remove('show'); return; }
  var results = [];
  for (var i = 0; i < MEMBERS.length; i++) {
    var m = MEMBERS[i];
    var id = String(m.id||'').toLowerCase();
    var name = String(m.name||'').toLowerCase();
    if (id.indexOf(query) !== -1 || name.indexOf(query) !== -1) {
      results.push(m);
      if (results.length >= 20) break;
    }
  }
  if (results.length === 0) {
    memberListEl.innerHTML = '<div class="autocomplete-item" style="color:#78909c">ไม่พบสมาชิก</div>';
    memberListEl.classList.add('show');
    return;
  }
  var html = '';
  for (var j = 0; j < results.length; j++) {
    var r = results[j];
    html += '<div class="autocomplete-item" onclick="selectMember('+j+')">';
    html += '<span class="id">'+r.id+'</span> ';
    html += '<span class="name">'+r.name+'</span> ';
    html += '<span class="detail">| '+r.team+' | '+r.company+'</span></div>';
  }
  memberListEl.innerHTML = html;
  memberListEl.classList.add('show');
  window._sr = results;
  selectedIdx = -1;
});

memberIdInput.addEventListener('keydown', function(e) {
  var items = memberListEl.querySelectorAll('.autocomplete-item');
  if (!memberListEl.classList.contains('show')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx+1, items.length-1); for(var i=0;i<items.length;i++)items[i].classList.remove('active'); if(items[selectedIdx])items[selectedIdx].classList.add('active'); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx-1, 0); for(var i=0;i<items.length;i++)items[i].classList.remove('active'); if(items[selectedIdx])items[selectedIdx].classList.add('active'); }
  else if (e.key === 'Enter') { e.preventDefault(); if (selectedIdx >= 0 && window._sr && window._sr[selectedIdx]) selectMember(selectedIdx); }
  else if (e.key === 'Escape') { memberListEl.classList.remove('show'); }
});

function selectMember(idx) {
  var m = window._sr[idx];
  if (!m) return;
  selectedMember = m;
  memberIdInput.value = m.id;
  document.getElementById('memberName').value = m.name || '—';
  document.getElementById('memberTeam').value = m.team || '—';
  document.getElementById('memberCompany').value = m.company || '—';
  document.getElementById('btnNext1').disabled = false;
  memberListEl.classList.remove('show');
}

document.addEventListener('click', function(e) { if (!e.target.closest('.id-wrapper')) memberListEl.classList.remove('show'); });

function goToPage(page) {
  if (page === 2 && !selectedMember) { document.getElementById('memberError').textContent = 'กรุณาเลือกสมาชิกก่อน'; return; }
  ['page1','page2','page3'].forEach(function(id) { document.getElementById(id).classList.add('hidden'); });
  document.getElementById('page'+page).classList.remove('hidden');
  for (var i = 1; i <= 3; i++) { var dot = document.getElementById('dot'+i); dot.classList.remove('active','done'); if (i < page) dot.classList.add('done'); if (i === page) dot.classList.add('active'); }
  window.scrollTo(0, 0);
}

function submitForm() {
  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังส่ง...';

  var formData = {
    action: 'submitForm',
    member_id: String(selectedMember.id),
    member_name: selectedMember.name || '',
    member_team: selectedMember.team || '',
    member_company: selectedMember.company || ''
  };

  for (var i = 1; i <= 6; i++) {
    var sel = document.querySelector('.scale-btn.selected[data-group="acct_'+i+'"]');
    if (!sel) { alert('กรุณาตอบคำถามบัญชีข้อ '+i+' ให้ครบ'); btn.disabled=false; btn.textContent='✅ ส่งแบบสำรวจ'; return; }
  }
  formData.acct_collaboration = document.querySelector('.scale-btn.selected[data-group="acct_1"]')?.getAttribute('data-value')||'';
  formData.acct_speed = document.querySelector('.scale-btn.selected[data-group="acct_2"]')?.getAttribute('data-value')||'';
  formData.acct_efficiency = document.querySelector('.scale-btn.selected[data-group="acct_3"]')?.getAttribute('data-value')||'';
  formData.acct_accuracy = document.querySelector('.scale-btn.selected[data-group="acct_4"]')?.getAttribute('data-value')||'';
  formData.acct_consultation = document.querySelector('.scale-btn.selected[data-group="acct_5"]')?.getAttribute('data-value')||'';
  formData.acct_overall = document.querySelector('.scale-btn.selected[data-group="acct_6"]')?.getAttribute('data-value')||'';
  formData.acct_suggestion = document.getElementById('acctSuggestion').value || '';

  for (var j = 1; j <= 6; j++) {
    var sel2 = document.querySelector('.scale-btn.selected[data-group="fin_'+j+'"]');
    if (!sel2) { alert('กรุณาตอบคำถามการเงินข้อ '+j+' ให้ครบ'); btn.disabled=false; btn.textContent='✅ ส่งแบบสำรวจ'; return; }
  }
  formData.fin_collaboration = document.querySelector('.scale-btn.selected[data-group="fin_1"]')?.getAttribute('data-value')||'';
  formData.fin_speed = document.querySelector('.scale-btn.selected[data-group="fin_2"]')?.getAttribute('data-value')||'';
  formData.fin_efficiency = document.querySelector('.scale-btn.selected[data-group="fin_3"]')?.getAttribute('data-value')||'';
  formData.fin_accuracy = document.querySelector('.scale-btn.selected[data-group="fin_4"]')?.getAttribute('data-value')||'';
  formData.fin_consultation = document.querySelector('.scale-btn.selected[data-group="fin_5"]')?.getAttribute('data-value')||'';
  formData.fin_overall = document.querySelector('.scale-btn.selected[data-group="fin_6"]')?.getAttribute('data-value')||'';
  formData.fin_suggestion = document.getElementById('finSuggestion').value || '';

  // ส่งผ่าน fetch no-cors
  fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(formData)
  }).then(function() {
    showSuccess();
  }).catch(function() {
    showSuccess();
  });
}

function showSuccess() {
  ['page1','page2','page3'].forEach(function(id) { document.getElementById(id).classList.add('hidden'); });
  document.getElementById('successPage').classList.remove('hidden');
  document.getElementById('submitInfo').textContent = selectedMember.id + ' ' + selectedMember.name + ' ผู้ทำแบบประเมิน ได้ทำการประเมินเรียบร้อยแล้ว';
}

// รอให้ MEMBERS โหลดเสร็จ
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initForm);
} else {
  initForm();
}
</script>
</body>
</html>
