<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Exam - เจ้าหน้าที่ความปลอดภัยในการทำงาน</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Sarabun','Segoe UI',Tahoma,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:10px;}
        .quiz-container{max-width:650px;width:100%;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.1);overflow:hidden;}
        .header{background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:white;padding:16px;}
        .header h1{font-size:16px;margin-bottom:4px;}
        .header .subtitle{font-size:12px;opacity:0.9;}
        .progress-bar{background:#e8e8e8;height:8px;border-radius:4px;margin:12px 0 6px;overflow:hidden;}
        .progress-fill{height:100%;background:#4fc3f7;border-radius:4px;transition:width 0.3s;}
        .progress-info{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.9);}
        .score-display{display:flex;gap:10px;}
        .score-item{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:10px;font-size:11px;}
        .score-correct{background:rgba(255,255,255,0.2);color:#fff;}
        .score-wrong{background:rgba(255,255,255,0.2);color:#fff;}
        .question-area{padding:20px 16px;}
        .category-tag{display:inline-block;background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:10px;font-size:11px;margin-bottom:10px;}
        .question-number{font-size:13px;color:#666;margin-bottom:6px;}
        .question-text{font-size:17px;color:#333;line-height:1.6;margin-bottom:20px;font-weight:500;}
        .options{display:flex;flex-direction:column;gap:10px;}
        .option-btn{display:flex;align-items:center;gap:10px;padding:14px;background:#f8f9fa;border:2px solid #e8e8e8;border-radius:10px;cursor:pointer;transition:all 0.2s;width:100%;font-size:15px;text-align:left;}
        .option-btn:hover:not(.disabled){background:#e3f2fd;border-color:#1a73e8;}
        .option-btn.correct{background:#e8f5e9;border-color:#4caf50;}
        .option-btn.wrong{background:#ffebee;border-color:#f44336;}
        .option-btn.disabled{cursor:default;opacity:0.7;}
        .option-label{width:28px;height:28px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
        .option-btn.correct .option-label{background:#4caf50;color:white;}
        .option-btn.wrong .option-label{background:#f44336;color:white;}
        .explanation{display:none;margin-top:16px;padding:14px;background:#f8f9fa;border-radius:10px;border-left:4px solid #1a73e8;}
        .explanation.show{display:block;}
        .explanation h4{color:#1a73e8;margin-bottom:6px;font-size:13px;}
        .explanation p{color:#555;line-height:1.6;font-size:13px;}
        .next-btn{display:none;width:100%;padding:14px;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;}
        .next-btn.show{display:block;}
        .results{display:none;padding:24px 16px;text-align:center;}
        .results.show{display:block;}
        .results .score-circle{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;color:white;}
        .results .score-circle .score-num{font-size:30px;font-weight:700;}
        .results .score-circle .score-total{font-size:12px;opacity:0.9;}
        .results h2{font-size:20px;color:#333;margin-bottom:6px;}
        .results .grade{font-size:14px;color:#666;margin-bottom:20px;}
        .results .summary{text-align:left;background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:16px;max-height:400px;overflow-y:auto;}
        .results .summary h3{font-size:13px;color:#333;margin-bottom:10px;}
        .result-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:#555;}
        .restart-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
        @media(max-width:480px){.question-text{font-size:15px;}.option-btn{padding:10px;font-size:14px;}}
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <h1>🛡️ Mock Exam - เจ้าหน้าที่ความปลอดภัยในการทำงาน</h1>
            <div class="subtitle">ตามกฎกระทรวง กำหนดมาตรฐานในการบริหารและการจัดการด้านความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงาน</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-info">
                <span id="qNum">1 / 30</span>
                <div class="score-display">
                    <span class="score-item score-wrong">✗ <span id="wrongCount">0</span></span>
                    <span class="score-item score-correct">✓ <span id="correctCount">0</span></span>
                </div>
            </div>
        </div>
        <div class="question-area" id="questionArea">
            <span class="category-tag" id="categoryTag"></span>
            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="explanation" id="explanation"><h4>💡 คำอธิบาย</h4><p id="explanationText"></p></div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">ถัดไป →</button>
        </div>
        <div class="results" id="resultsArea">
            <div class="score-circle"><span class="score-num" id="finalScore">0</span><span class="score-total">/ 30</span></div>
            <h2 id="resultTitle">เสร็จสิ้น!</h2>
            <div class="grade" id="resultGrade"></div>
            <div class="summary"><h3>📝 สรุปคำตอบ</h3><div id="summaryList"></div></div>
            <button class="restart-btn" onclick="restartQuiz()">🔄 ทำข้อสอบใหม่</button>
        </div>
    </div>
    <script>
const questions = [
{category:"หน้าที่ จป.",question:"ข้อใดคือหน้าที่หลักของเจ้าหน้าที่ความปลอดภัยในการทำงาน (จป.)?",options:["ตรวจสอบเวลาเข้า-ออกของพนักงาน","เสนอแนะนายจ้างเกี่ยวกับมาตรการความปลอดภัย","จัดสรรเงินเดือนพนักงาน","ดูแลเรื่องสวัสดิการพนักงาน"],answer:1,explain:"หน้าที่หลักของ จป. คือ ให้คำปรึกษาและเสนอแนะต่อนายจ้างเกี่ยวกับมาตรการความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงาน"},
{category:"หน้าที่ จป.",question:"จป. ต้องจัดทำรายงานผลการปฏิบัติงานความปลอดภัยเสนอต่อนายจ้างอย่างน้อยความถี่เท่าใด?",options:["ทุกสัปดาห์","ทุกเดือน","ทุกไตรมาส","ทุกปี"],answer:1,explain:"จป. ต้องจัดทำรายงานผลการปฏิบัติงานความปลอดภัยเสนอต่อนายจ้างอย่างน้อยเดือนละ 1 ครั้ง"},
{category:"หน้าที่ จป.",question:"ข้อใด NOT เป็นหน้าที่ของ จป.?",options:["ตรวจสอบและประเมินความเสี่ยง","ให้คำปรึกษาแก่นายจ้าง","อนุมัติงบประมาณซื้ออุปกรณ์","เสนอแนะมาตรการป้องกันอุบัติเหตุ"],answer:2,explain:"การอนุมัติงบประมาณเป็นหน้าที่ของนายจ้าง ไม่ใช่ จป. หน้าที่ของ จป. คือ ให้คำปรึกษา เสนอแนะ ตรวจสอบ และประเมินความเสี่ยง"},
{category:"หน้าที่ จป.",question:"เมื่อเกิดอุบัติเหตุในสถานประกอบกิจการ จป. ต้องทำอย่างไรเป็นอันดับแรก?",options:["สอบสวนหาสาเหตุและรายงานนายจ้าง","ไล่ออกพนักงานที่ทำผิด","ปิดสถานที่ทำงานทันที","เรียกค่าเสียหายจากพนักงาน"],answer:0,explain:"เมื่อเกิดอุบัติเหตุ จป. ต้องสอบสวนหาสาเหตุและรายงานนายจ้าง พร้อมทั้งเสนอแนะมาตรการป้องกันไม่ให้เกิดซ้ำ"},
{category:"หน้าที่ จป.",question:"จป. มีหน้าที่ต้องดำเนินการอบรมและฝึกซ้อมอะไรเป็นประจำ?",options:["อบรมการขาย","ฝึกซ้อมแผนฉุกเฉิน","อบรมการตลาด","ฝึกซ้อมการเจรจา"],answer:1,explain:"จป. มีหน้าที่จัดฝึกอบรมและฝึกซ้อมแผนฉุกเฉิน เช่น แผนอพยพหนีไฟ แผนตอบสนองต่อสารเคมีหกรั่วไหล"},
{category:"ประเภท จป.",question:"สถานประกอบกิจการประเภทใดต้องมี จป. ระดับวิชาชีพ?",options:["กิจการที่มีลูกจ้างน้อยกว่า 20 คน","กิจการที่มีความเสี่ยงสูงและมีลูกจ้างตั้งแต่ 50 คนขึ้นไป","กิจการสำนักงานทั่วไป","กิจการร้านค้าปลีก"],answer:1,explain:"กิจการที่มีความเสี่ยงสูงและมีลูกจ้างตั้งแต่ 50 คนขึ้นไป ต้องมี จป. ระดับวิชาชีพ (Safety Officer at Professional Level)"},
{category:"ประเภท จป.",question:"จป. ระดับเทคนิค (Technical Level) ต่างจาก จป. ระดับวิชาชีพอย่างไร?",options:["จป. เทคนิคทำงานน้อยกว่า","จป. วิชาชีพต้องมีความรู้ระดับปริญญาตรีด้านความปลอดภัยโดยตรง","จป. เทคนิคไม่ต้องผ่านการอบรม","ไม่แตกต่างกัน"],answer:1,explain:"จป. วิชาชีพ ต้องสำเร็จการศึกษาระดับปริญญาตรีด้านความปลอดภัยโดยตรง ส่วน จป. เทคนิค ผ่านการอบรมด้านความปลอดภัยที่กำหนด"},
{category:"ประเภท จป.",question:"คณะกรรมการความปลอดภัยในการทำงาน (คปอ.) ต้องมีสมาชิกอย่างน้อยกี่คน?",options:["3 คน","5 คน","10 คน","15 คน"],answer:1,explain:"คปอ. ต้องมีสมาชิกอย่างน้อย 5 คน ประกอบด้วยตัวแทนนายจ้างและตัวแทนลูกจ้าง"},
{category:"ประเภท จป.",question:"ใครเป็นประธานคณะกรรมการความปลอดภัย (คปอ.)?",options:["จป. ระดับวิชาชีพ","ตัวแทนลูกจ้าง","นายจ้างหรือผู้ที่นายจ้างมอบหมาย","พนักงานอาวุโส"],answer:2,explain:"นายจ้างหรือผู้ที่นายจ้างมอบหมายเป็นประธาน คปอ."},
{category:"ประเภท จป.",question:"คปอ. ต้องประชุมอย่างน้อยกี่ครั้งต่อปี?",options:["1 ครั้ง","4 ครั้ง","12 ครั้ง","24 ครั้ง"],answer:1,explain:"คปอ. ต้องประชุมอย่างน้อยทุก 3 เดือน (ปีละ 4 ครั้ง)"},
{category:"กฎหมายความปลอดภัย",question:"กฎหมายใดเป็นกฎหมายหลักด้านความปลอดภัยในการทำงานของประเทศไทย?",options:["ประมวลกฎหมายแพ่ง","พระราชบัญญัติความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงาน พ.ศ. 2554","กฎหมายคุ้มครองผู้บริโภค","กฎหมายแรงงานสัมพันธ์"],answer:1,explain:"พ.ร.บ. ความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงาน พ.ศ. 2554 เป็นกฎหมายหลักด้านความปลอดภัย"},
{category:"กฎหมายความปลอดภัย",question:"นายจ้างที่ไม่จัดให้มี จป. ตามกฎหมาย จะมีโทษอย่างไร?",options:["ตักเตือนด้วยวาจา","ปรับไม่เกิน 200,000 บาท หรือจำคุกไม่เกิน 1 ปี หรือทั้งจำทั้งปรับ","ไม่มีโทษ","แค่ให้เวลาแก้ไข"],answer:1,explain:"นายจ้างที่ไม่ปฏิบัติตามกฎหมายความปลอดภัย มีโทษปรับไม่เกิน 200,000 บาท หรือจำคุกไม่เกิน 1 ปี หรือทั้งจำทั้งปรับ"},
{category:"กฎหมายความปลอดภัย",question:"ลูกจ้างมีสิทธิ์ใดบ้างเมื่อพบว่าสถานที่ทำงานไม่ปลอดภัย?",options:["ลาออกทันทีโดยไม่ต้องบอก","ร้องเรียนต่อนายจ้างหรือพนักงานตรวจความปลอดภัย","หยุดงานโดยไม่บอกใคร","เรียกร้องเงินชดเชยทันที"],answer:1,explain:"ลูกจ้างมีสิทธิ์ร้องเรียนต่อนายจ้างหรือพนักงานตรวจความปลอดภัยเมื่อพบสภาพการทำงานที่ไม่ปลอดภัย"},
{category:"กฎหมายความปลอดภัย",question:"นายจ้างต้องให้ลูกจ้างเข้ารับการฝึกอบรมความปลอดภัยเมื่อใด?",options:["เมื่อลูกจ้างร้องขอ","ก่อนเข้าทำงานและเมื่อเปลี่ยนงานหรือเปลี่ยนสถานที่","ทุกปีเท่านั้น","เมื่อเกิดอุบัติเหตุแล้วเท่านั้น"],answer:1,explain:"นายจ้างต้องให้ลูกจ้างเข้ารับการฝึกอบรมความปลอดภัยก่อนเข้าทำงาน และเมื่อเปลี่ยนงานหรือเปลี่ยนสถานที่ทำงาน"},
{category:"กฎหมายความปลอดภัย",question:"นายจ้างต้องแจ้งเหตุการณ์การประสบอันตรายของลูกจ้างต่อพนักงานตรวจความปลอดภัยภายในกี่วัน?",options:["1 วัน","3 วัน","7 วัน","30 วัน"],answer:2,explain:"นายจ้างต้องแจ้งเหตุการณ์การประสบอันตรายของลูกจ้างต่อพนักงานตรวจความปลอดภัยภายใน 7 วัน"},
{category:"การประเมินความเสี่ยง",question:"ขั้นตอนแรกของการประเมินความเสี่ยงคืออะไร?",options:["กำหนดมาตรการควบคุม","ระบุอันตราย (Hazard Identification)","คำนวณระดับความเสี่ยง","จัดทำรายงาน"],answer:1,explain:"ขั้นตอนแรกของการประเมินความเสี่ยงคือการระบุอันตราย (Hazard Identification) ก่อน จากนั้นจึงประเมินความเสี่ยงและกำหนดมาตรการควบคุม"},
{category:"การประเมินความเสี่ยง",question:"ระดับความเสี่ยง (Risk Level) คำนวณจากอะไร?",options:["ความถี่ x ค่าใช้จ่าย","ความรุนแรง x โอกาสเกิด","จำนวนพนักงาน x ชั่วโมงทำงาน","ค่าใช้จ่าย x เวลา"],answer:1,explain:"ระดับความเสี่ยง = ความรุนแรง (Severity) x โอกาสเกิด (Likelihood)"},
{category:"การประเมินความเสี่ยง",question:"ข้อใดคือมาตรการควบคุมความเสี่ยงที่มีประสิทธิภาพสูงสุด?",options:["ใช้อุปกรณ์ป้องกันส่วนบุคคล (PPE)","กำจัดอันตรายที่แหล่งกำเนิด (Elimination)","ติดป้ายเตือน","ฝึกอบรมพนักงาน"],answer:1,explain:"มาตรการควบคุมที่มีประสิทธิภาพสูงสุดคือการกำจัดอันตรายที่แหล่งกำเนิด (Elimination) ตาม Hierarchy of Controls"},
{category:"การประเมินความเสี่ยง",question:"JSA (Job Safety Analysis) คืออะไร?",options:["ระบบบัญชี","การวิเคราะห์ความปลอดภัยของงาน","โปรแกรมคอมพิวเตอร์","กฎหมายความปลอดภัย"],answer:1,explain:"JSA (Job Safety Analysis) คือ การวิเคราะห์ความปลอดภัยของงาน โดยแบ่งงานเป็นขั้นตอน ระบุอันตรายแต่ละขั้นตอน และกำหนดมาตรการป้องกัน"},
{category:"การประเมินความเสี่ยง",question:"เครื่องมือใดใช้วิเคราะห์สาเหตุรากฐานของอุบัติเหตุ?",options:["SWOT Analysis","5 Whys / Fishbone Diagram","Balance Scorecard","Gantt Chart"],answer:1,explain:"5 Whys และ Fishbone Diagram (แผนผังก้างปลา) เป็นเครื่องมือวิเคราะห์สาเหตุรากฐาน (Root Cause Analysis) ของอุบัติเหตุ"},

let currentQ = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let userAnswers = [];

function loadQuestion() {
    answered = false;
    const q = questions[currentQ];
    document.getElementById('categoryTag').textContent = q.category;
    document.getElementById('questionNumber').textContent = `ข้อที่ ${currentQ + 1}/30`;
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('qNum').textContent = `${currentQ + 1} / 30`;
    document.getElementById('progressFill').style.width = `${(currentQ / 30) * 100}%`;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const labels = ['ก', 'ข', 'ค', 'ง'];
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
    });

    document.getElementById('explanation').classList.remove('show');
    document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(index) {
    if (answered) return;
    answered = true;
    const q = questions[currentQ];
    const btns = document.querySelectorAll('.option-btn');

    btns.forEach((btn, i) => {
        btn.classList.add('disabled');
        if (i === q.answer) btn.classList.add('correct');
        else if (i === index && i !== q.answer) btn.classList.add('wrong');
    });

    if (index === q.answer) {
        correct++;
        document.getElementById('correctCount').textContent = correct;
    } else {
        wrong++;
        document.getElementById('wrongCount').textContent = wrong;
    }

    userAnswers.push({question: q.question, user: index, correct: q.answer, isCorrect: index === q.answer, category: q.category});
    document.getElementById('explanationText').textContent = q.explain;
    document.getElementById('explanation').classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) loadQuestion();
    else showResults();
}

function showResults() {
    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('resultsArea').classList.add('show');
    document.getElementById('finalScore').textContent = correct;

    const percent = (correct / 30) * 100;
    let grade = '';
    if (percent >= 80) grade = '🌟 ดีมาก! ผ่านเกณฑ์พร้อมปฏิบัติงาน!';
    else if (percent >= 60) grade = '👍 ดี! แต่ควรทบทวนเพิ่มเติม';
    else if (percent >= 40) grade = '📚 พอใช้! ต้องทบทวนอย่างจริงจัง';
    else grade = '💪 ต้องศึกษาเพิ่ม! สู้ๆ!';

    document.getElementById('resultGrade').textContent = `${percent.toFixed(0)}% — ${grade}`;

    const labels = ['ก', 'ข', 'ค', 'ง'];
    let summary = '';
    userAnswers.forEach((a, i) => {
        const icon = a.isCorrect ? '✅' : '❌';
        summary += `<div class="result-item"><span class="icon">${icon}</span> ข้อ ${i+1} (${a.category}): ตอบ ${labels[a.user]} / เฉลย ${labels[a.correct]}</div>`;
    });
    document.getElementById('summaryList').innerHTML = summary;
}

function restartQuiz() {
    currentQ = 0; correct = 0; wrong = 0; userAnswers = [];
    document.getElementById('correctCount').textContent = '0';
    document.getElementById('wrongCount').textContent = '0';
    document.getElementById('questionArea').style.display = 'block';
    document.getElementById('resultsArea').classList.remove('show');
    loadQuestion();
}

loadQuestion();
    </script>
